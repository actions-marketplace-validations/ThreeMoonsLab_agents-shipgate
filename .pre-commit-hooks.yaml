# Canonical pre-commit hook manifest. pre-commit reads this file from the
# repo root when a downstream project uses
#   repos:
#     - repo: https://github.com/ThreeMoonsLab/agents-shipgate
#       rev: v0.10.0
#       hooks:
#         - id: <hook id below>
#
# Scope: the `files:` regex below covers every **path-based** trigger from
# `docs/triggers.json` — manifest, MCP/OpenAPI/Swagger exports, static tool
# inventories, Codex plugin package files, prompts/policies, AND the Shipgate
# CI workflow files.
# Diff-only triggers (`TRIGGER-FUNCTION-TOOL-DECORATOR` and
# `TRIGGER-FRAMEWORK-VERSION-BUMP`) are not covered here — pre-commit's
# `files:` regex is purely path-based and cannot inspect diff contents.
# Use the GitHub Action or `python -m agents_shipgate.triggers --git-diff HEAD`
# for full trigger coverage.
- id: agents-shipgate
  name: Agents Shipgate release-readiness gate
  description: >
    Static release-readiness scan for AI agent tool surfaces. Advisory mode —
    never blocks the commit. Switch to `agents-shipgate-strict` (or change the
    `entry:` to `--ci-mode strict`) to fail on critical findings locally.
  entry: agents-shipgate scan -c shipgate.yaml --ci-mode advisory
  language: python
  pass_filenames: false
  always_run: false
  stages: [pre-commit, pre-push]
  files: |
    (?x)^(
      shipgate\.yaml|
      .*tools.*\.json|
      .*mcp.*\.json|
      .*\.codex-plugin/.*|
      .*\.agents/plugins/.*|
      .*\.app\.json|
      (.*/)?SKILL\.md|
      .*openapi.*\.(yaml|yml|json)|
      .*swagger.*\.(yaml|yml|json)|
      \.agents-shipgate/.*\.json|
      prompts/.*|
      policies/.*|
      \.github/workflows/agents-shipgate\.(yaml|yml)
    )$
  minimum_pre_commit_version: "3.0.0"

- id: agents-shipgate-strict
  name: Agents Shipgate release-readiness gate (strict)
  description: >
    Strict-mode release-readiness scan; fails the hook on critical findings.
    Pair with a baseline (`docs/baseline.md`) so accepted findings don't
    block every commit.
  entry: agents-shipgate scan -c shipgate.yaml --ci-mode strict --fail-on critical
  language: python
  pass_filenames: false
  always_run: false
  stages: [pre-push]
  files: |
    (?x)^(
      shipgate\.yaml|
      .*tools.*\.json|
      .*mcp.*\.json|
      .*\.codex-plugin/.*|
      .*\.agents/plugins/.*|
      .*\.app\.json|
      (.*/)?SKILL\.md|
      .*openapi.*\.(yaml|yml|json)|
      .*swagger.*\.(yaml|yml|json)|
      \.agents-shipgate/.*\.json|
      prompts/.*|
      policies/.*|
      \.github/workflows/agents-shipgate\.(yaml|yml)
    )$
  minimum_pre_commit_version: "3.0.0"

- id: agents-shipgate-validate
  name: Agents Shipgate manifest validate
  description: Validate `shipgate.yaml` without running checks.
  entry: agents-shipgate doctor --json
  language: python
  pass_filenames: false
  stages: [pre-commit]
  files: '^shipgate\.yaml$'
  minimum_pre_commit_version: "3.0.0"
