name: Agents Shipgate
description: >-
  Static release-readiness gate for AI agent tool surfaces. Scans MCP, OpenAPI,
  OpenAI Agents SDK, Anthropic, Google ADK, LangChain, and CrewAI artifacts.
  Writes a Tool-Use Readiness Report (Markdown / JSON / SARIF) before your
  agent gets production-like permissions. No LLM calls. No agent execution.
  Apache-2.0.
author: ThreeMoonsLab

branding:
  icon: shield
  color: blue

inputs:
  config:
    required: false
    default: shipgate.yaml
    description: Path to shipgate.yaml.
  ci_mode:
    required: false
    default: advisory
    description: advisory or strict.
  fail_on:
    required: false
    default: ""
    description: Optional comma-separated severities that fail CI, for example critical,high.
  baseline:
    required: false
    default: ""
    description: Optional local baseline JSON path. Strict mode fails only on new findings.
  baseline_mode:
    required: false
    default: new-findings
    description: "Baseline comparison mode. Supported value: new-findings."
  policy_packs:
    required: false
    default: ""
    description: Optional comma- or newline-separated declarative YAML policy pack paths.
  no_plugins:
    required: false
    default: "false"
    description: Force third-party check plugins off even when AGENTS_SHIPGATE_ENABLE_PLUGINS is set.
  output_dir:
    required: false
    default: agents-shipgate-reports
    description: Output directory for reports.
  upload_artifact:
    required: false
    default: "true"
    description: Upload reports as a workflow artifact.
  pr_comment:
    required: false
    default: "false"
    description: Post a short PR comment when running on pull_request.
  github_token:
    required: false
    default: ""
    description: Token for optional PR comments.
  shipgate_version:
    required: false
    default: ""
    description: Optional Agents Shipgate PyPI version to install. Empty installs this action source.

outputs:
  status:
    description: Agents Shipgate summary status.
    value: ${{ steps.report_outputs.outputs.status }}
  critical_count:
    description: Number of unsuppressed critical findings.
    value: ${{ steps.report_outputs.outputs.critical_count }}
  high_count:
    description: Number of unsuppressed high findings.
    value: ${{ steps.report_outputs.outputs.high_count }}
  medium_count:
    description: Number of unsuppressed medium findings.
    value: ${{ steps.report_outputs.outputs.medium_count }}
  baseline_new_count:
    description: Number of new findings when a baseline is used.
    value: ${{ steps.report_outputs.outputs.baseline_new_count }}
  baseline_matched_count:
    description: Number of baseline-matched findings when a baseline is used.
    value: ${{ steps.report_outputs.outputs.baseline_matched_count }}
  baseline_resolved_count:
    description: Number of baseline findings resolved by the current scan.
    value: ${{ steps.report_outputs.outputs.baseline_resolved_count }}
  adk_agent_count:
    description: Number of Google ADK agents statically detected.
    value: ${{ steps.report_outputs.outputs.adk_agent_count }}
  adk_dynamic_toolset_count:
    description: Number of Google ADK toolsets that were dynamic or unresolved.
    value: ${{ steps.report_outputs.outputs.adk_dynamic_toolset_count }}
  report_json:
    description: Path to the generated JSON report.
    value: ${{ steps.report_outputs.outputs.report_json }}
  report_markdown:
    description: Path to the generated Markdown report.
    value: ${{ steps.report_outputs.outputs.report_markdown }}
  report_sarif:
    description: Path to the generated SARIF report.
    value: ${{ steps.report_outputs.outputs.report_sarif }}
  exit_code:
    description: Agents Shipgate CLI exit code.
    value: ${{ steps.scan.outputs.exit_code }}
  decision:
    description: Release decision (`blocked`, `review_required`, or `passed`). v0.8+.
    value: ${{ steps.report_outputs.outputs.decision }}
  blocker_count:
    description: Number of blockers in release_decision (v0.8+).
    value: ${{ steps.report_outputs.outputs.blocker_count }}
  review_item_count:
    description: Number of review items in release_decision (v0.8+).
    value: ${{ steps.report_outputs.outputs.review_item_count }}
  ci_would_fail:
    description: Whether the active fail policy would fail CI (`true`/`false`). v0.8+.
    value: ${{ steps.report_outputs.outputs.ci_would_fail }}

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
      with:
        python-version: "3.12"

    - name: Install Agents Shipgate
      shell: bash
      env:
        SHIPGATE_VERSION: ${{ inputs.shipgate_version }}
      run: |
        if [ -n "${SHIPGATE_VERSION}" ]; then
          python -m pip install "agents-shipgate==${SHIPGATE_VERSION}"
        else
          python -m pip install "${GITHUB_ACTION_PATH}"
        fi

    - name: Run Agents Shipgate
      id: scan
      shell: bash
      env:
        CONFIG: ${{ inputs.config }}
        CI_MODE: ${{ inputs.ci_mode }}
        FAIL_ON: ${{ inputs.fail_on }}
        BASELINE: ${{ inputs.baseline }}
        BASELINE_MODE: ${{ inputs.baseline_mode }}
        POLICY_PACKS: ${{ inputs.policy_packs }}
        NO_PLUGINS: ${{ inputs.no_plugins }}
        OUTPUT_DIR: ${{ inputs.output_dir }}
      run: |
        args=(
          scan
          --config "${CONFIG}"
          --ci-mode "${CI_MODE}"
          --out "${OUTPUT_DIR}"
          --format markdown,json,sarif
        )
        if [ -n "${FAIL_ON}" ]; then
          args+=(--fail-on "${FAIL_ON}")
        fi
        if [ -n "${BASELINE}" ]; then
          args+=(--baseline "${BASELINE}" --baseline-mode "${BASELINE_MODE}")
        fi
        if [ -n "${POLICY_PACKS}" ]; then
          while IFS= read -r policy_pack; do
            [ -z "${policy_pack}" ] && continue
            args+=(--policy-pack "${policy_pack}")
          done < <(printf '%s\n' "${POLICY_PACKS}" | tr ',' '\n')
        fi
        if [ "${NO_PLUGINS}" = "true" ]; then
          args+=(--no-plugins)
        fi
        set +e
        agents-shipgate "${args[@]}"
        exit_code=$?
        echo "exit_code=${exit_code}" >> "${GITHUB_OUTPUT}"
        exit 0

    - name: Extract Agents Shipgate outputs
      id: report_outputs
      if: ${{ always() }}
      shell: bash
      env:
        OUTPUT_DIR: ${{ inputs.output_dir }}
      run: |
        python - <<'PY'
        import json
        import os
        from pathlib import Path

        output_dir = Path(os.environ.get("OUTPUT_DIR") or "agents-shipgate-reports")
        report_json = output_dir / "report.json"
        report_markdown = output_dir / "report.md"
        report_sarif = output_dir / "report.sarif"
        summary = {}
        baseline = {}
        adk_surface = {}
        release_decision = {}
        fail_policy = {}
        if report_json.exists():
            with report_json.open(encoding="utf-8") as handle:
                payload = json.load(handle)
                summary = payload.get("summary") or {}
                baseline = payload.get("baseline") or {}
                adk_surface = (payload.get("frameworks") or {}).get("google_adk") or {}
                release_decision = payload.get("release_decision") or {}
                fail_policy = release_decision.get("fail_policy") or {}

        def clean(value: object) -> str:
            # `value or ""` would emit 0 as "", which breaks workflow
            # checks like `if: outputs.blocker_count == '0'`. Treat None
            # as empty; stringify everything else (including 0 and False).
            text = "" if value is None else str(value)
            return text.replace("\r", "").replace("\n", "")

        values = {
            "status": summary.get("status", ""),
            "critical_count": summary.get("critical_count", 0),
            "high_count": summary.get("high_count", 0),
            "medium_count": summary.get("medium_count", 0),
            "baseline_new_count": baseline.get("new_count", 0),
            "baseline_matched_count": baseline.get("matched_count", 0),
            "baseline_resolved_count": baseline.get("resolved_count", 0),
            "adk_agent_count": adk_surface.get("agent_count", 0),
            "adk_dynamic_toolset_count": adk_surface.get("dynamic_toolset_count", 0),
            "report_json": report_json,
            "report_markdown": report_markdown,
            "report_sarif": report_sarif,
            "decision": release_decision.get("decision", ""),
            "blocker_count": len(release_decision.get("blockers") or []),
            "review_item_count": len(release_decision.get("review_items") or []),
            # v0.8+ output. Pinned older package versions emit no release_decision,
            # so this stays false until the workflow installs v0.8+.
            "ci_would_fail": str(bool(fail_policy.get("would_fail_ci"))).lower(),
        }
        with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
            for key, value in values.items():
                output.write(f"{key}={clean(value)}\n")

        step_summary = os.environ.get("GITHUB_STEP_SUMMARY")
        if step_summary:
            blocker_count = len(release_decision.get("blockers") or [])
            review_item_count = len(release_decision.get("review_items") or [])
            would_fail_ci = str(bool(fail_policy.get("would_fail_ci"))).lower()
            with open(step_summary, "a", encoding="utf-8") as summary_file:
                summary_file.write("## Agents Shipgate\n\n")
                if release_decision:
                    summary_file.write(
                        f"- Decision: `{clean(release_decision.get('decision'))}`\n"
                    )
                    summary_file.write(f"- Blockers: {blocker_count}\n")
                    summary_file.write(f"- Review items: {review_item_count}\n")
                    summary_file.write(
                        "- Fail policy: "
                        f"would_fail_ci=`{would_fail_ci}` "
                        f"(exit {clean(fail_policy.get('exit_code'))})\n"
                    )
                else:
                    summary_file.write(f"- Status: `{clean(summary.get('status'))}`\n")
                    summary_file.write(
                        f"- Critical: {clean(summary.get('critical_count', 0))} · "
                        f"High: {clean(summary.get('high_count', 0))} · "
                        f"Medium: {clean(summary.get('medium_count', 0))}\n"
                    )
                summary_file.write(f"- Report JSON: `{clean(report_json)}`\n")
        PY

    - name: Upload Agents Shipgate report
      if: ${{ always() && inputs.upload_artifact == 'true' }}
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
      with:
        name: agents-shipgate-report
        path: ${{ inputs.output_dir }}/
        if-no-files-found: warn

    - name: Comment on pull request
      if: ${{ always() && inputs.pr_comment == 'true' && github.event_name == 'pull_request' }}
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
      env:
        OUTPUT_DIR: ${{ inputs.output_dir }}
      with:
        github-token: ${{ inputs.github_token || github.token }}
        script: |
          const fs = require("fs");
          const path = require("path");
          const reportPath = path.join(process.env.OUTPUT_DIR || "agents-shipgate-reports", "report.json");
          if (!fs.existsSync(reportPath)) {
            core.warning(`Agents Shipgate report not found at ${reportPath}`);
            return;
          }
          const report = JSON.parse(fs.readFileSync(reportPath, "utf8"));
          const summary = report.summary || {};
          const decision = report.release_decision || null;
          const adk = ((report.frameworks || {}).google_adk) || null;
          const escapeMarkdown = (value) =>
            String(value || "")
              .replace(/\\/g, "\\\\")
              .replace(/([\[\]\(\)`*_{}#+\-.!|>])/g, "\\$1");
          const truncate = (value, limit) => {
            const text = String(value || "");
            return text.length > limit ? `${text.slice(0, limit - 1)}…` : text;
          };
          const top = (report.findings || [])
            .filter((finding) => !finding.suppressed && ["critical", "high"].includes(finding.severity))
            .slice(0, 3)
            .map((finding, index) => `${index + 1}. ${escapeMarkdown(truncate(finding.title || finding.check_id, 240))}`)
            .join("\n");
          const decisionLines = decision
            ? [
                `Decision: \`${decision.decision}\``,
                `Reason: ${escapeMarkdown(decision.reason || "")}`,
                `Blockers: ${(decision.blockers || []).length} · Review items: ${(decision.review_items || []).length}`,
                `Fail policy: would_fail_ci=\`${(decision.fail_policy || {}).would_fail_ci ? "true" : "false"}\` (exit ${(decision.fail_policy || {}).exit_code ?? "?"})`,
              ]
            : [
                `Status: ${summary.status || "unknown"}`,
                `Critical: ${summary.critical_count || 0} · High: ${summary.high_count || 0} · Medium: ${summary.medium_count || 0}`,
                `Human review: ${summary.human_review_recommended ? "recommended" : "not required"}`,
              ];
          const body = truncate([
            "## Agents Shipgate",
            "",
            ...decisionLines,
            adk ? `Google ADK: ${adk.agent_count || 0} agents · ${adk.dynamic_toolset_count || 0} dynamic toolsets` : "",
            "",
            top ? `Top findings:\n${top}` : "No critical or high findings.",
            "",
            "Full report: `agents-shipgate-report` artifact."
          ].join("\n"), 6000);
          await github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
            body
          });

    - name: Apply Agents Shipgate exit code
      if: ${{ always() && steps.scan.outputs.exit_code != '' && steps.scan.outputs.exit_code != '0' }}
      shell: bash
      env:
        EXIT_CODE: ${{ steps.scan.outputs.exit_code }}
      run: exit "${EXIT_CODE}"
