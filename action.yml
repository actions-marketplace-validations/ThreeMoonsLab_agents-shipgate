name: Agents Shipgate
description: Run Agents Shipgate release-readiness scan.
author: ThreeMoonsLab

branding:
  icon: shield
  color: blue

inputs:
  config:
    required: false
    default: shipgate.yaml
    description: Path to shipgate.yaml.
  ci_mode:
    required: false
    default: advisory
    description: advisory or strict.
  fail_on:
    required: false
    default: ""
    description: Optional comma-separated severities that fail CI, for example critical,high.
  output_dir:
    required: false
    default: agents-shipgate-reports
    description: Output directory for reports.
  upload_artifact:
    required: false
    default: "true"
    description: Upload reports as a workflow artifact.
  pr_comment:
    required: false
    default: "false"
    description: Post a short PR comment when running on pull_request.
  github_token:
    required: false
    default: ""
    description: Token for optional PR comments.
  shipgate_version:
    required: false
    default: ""
    description: Optional Agents Shipgate PyPI version to install. Empty installs this action source.

outputs:
  status:
    description: Agents Shipgate summary status.
    value: ${{ steps.report_outputs.outputs.status }}
  critical_count:
    description: Number of unsuppressed critical findings.
    value: ${{ steps.report_outputs.outputs.critical_count }}
  high_count:
    description: Number of unsuppressed high findings.
    value: ${{ steps.report_outputs.outputs.high_count }}
  medium_count:
    description: Number of unsuppressed medium findings.
    value: ${{ steps.report_outputs.outputs.medium_count }}
  report_json:
    description: Path to the generated JSON report.
    value: ${{ steps.report_outputs.outputs.report_json }}
  report_markdown:
    description: Path to the generated Markdown report.
    value: ${{ steps.report_outputs.outputs.report_markdown }}
  exit_code:
    description: Agents Shipgate CLI exit code.
    value: ${{ steps.scan.outputs.exit_code }}

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
      with:
        python-version: "3.12"

    - name: Install Agents Shipgate
      shell: bash
      env:
        SHIPGATE_VERSION: ${{ inputs.shipgate_version }}
      run: |
        if [ -n "${SHIPGATE_VERSION}" ]; then
          python -m pip install "agents-shipgate==${SHIPGATE_VERSION}"
        else
          python -m pip install "${GITHUB_ACTION_PATH}"
        fi

    - name: Run Agents Shipgate
      id: scan
      shell: bash
      env:
        CONFIG: ${{ inputs.config }}
        CI_MODE: ${{ inputs.ci_mode }}
        FAIL_ON: ${{ inputs.fail_on }}
        OUTPUT_DIR: ${{ inputs.output_dir }}
      run: |
        args=(
          scan
          --config "${CONFIG}"
          --ci-mode "${CI_MODE}"
          --out "${OUTPUT_DIR}"
          --format markdown,json
        )
        if [ -n "${FAIL_ON}" ]; then
          args+=(--fail-on "${FAIL_ON}")
        fi
        set +e
        agents-shipgate "${args[@]}"
        exit_code=$?
        echo "exit_code=${exit_code}" >> "${GITHUB_OUTPUT}"
        exit 0

    - name: Extract Agents Shipgate outputs
      id: report_outputs
      if: ${{ always() }}
      shell: bash
      env:
        OUTPUT_DIR: ${{ inputs.output_dir }}
      run: |
        python - <<'PY'
        import json
        import os
        from pathlib import Path

        output_dir = Path(os.environ.get("OUTPUT_DIR") or "agents-shipgate-reports")
        report_json = output_dir / "report.json"
        report_markdown = output_dir / "report.md"
        summary = {}
        if report_json.exists():
            with report_json.open(encoding="utf-8") as handle:
                summary = (json.load(handle).get("summary") or {})

        def clean(value: object) -> str:
            return str(value or "").replace("\r", "").replace("\n", "")

        values = {
            "status": summary.get("status", ""),
            "critical_count": summary.get("critical_count", 0),
            "high_count": summary.get("high_count", 0),
            "medium_count": summary.get("medium_count", 0),
            "report_json": report_json,
            "report_markdown": report_markdown,
        }
        with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
            for key, value in values.items():
                output.write(f"{key}={clean(value)}\n")
        PY

    - name: Upload Agents Shipgate report
      if: ${{ always() && inputs.upload_artifact == 'true' }}
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
      with:
        name: agents-shipgate-report
        path: ${{ inputs.output_dir }}/
        if-no-files-found: warn

    - name: Comment on pull request
      if: ${{ always() && inputs.pr_comment == 'true' && github.event_name == 'pull_request' }}
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
      env:
        OUTPUT_DIR: ${{ inputs.output_dir }}
      with:
        github-token: ${{ inputs.github_token || github.token }}
        script: |
          const fs = require("fs");
          const path = require("path");
          const reportPath = path.join(process.env.OUTPUT_DIR || "agents-shipgate-reports", "report.json");
          if (!fs.existsSync(reportPath)) {
            core.warning(`Agents Shipgate report not found at ${reportPath}`);
            return;
          }
          const report = JSON.parse(fs.readFileSync(reportPath, "utf8"));
          const summary = report.summary || {};
          const escapeMarkdown = (value) =>
            String(value || "")
              .replace(/\\/g, "\\\\")
              .replace(/([\[\]\(\)`*_{}#+\-.!|>])/g, "\\$1");
          const top = (report.findings || [])
            .filter((finding) => !finding.suppressed && ["critical", "high"].includes(finding.severity))
            .slice(0, 3)
            .map((finding, index) => `${index + 1}. ${escapeMarkdown(finding.title || finding.check_id)}`)
            .join("\n");
          const body = [
            "## Agents Shipgate",
            "",
            `Status: ${summary.status || "unknown"}`,
            `Critical: ${summary.critical_count || 0} · High: ${summary.high_count || 0} · Medium: ${summary.medium_count || 0}`,
            `Human review: ${summary.human_review_recommended ? "recommended" : "not required"}`,
            "",
            top ? `Top findings:\n${top}` : "No critical or high findings.",
            "",
            "Full report: `agents-shipgate-report` artifact."
          ].join("\n");
          await github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
            body
          });

    - name: Apply Agents Shipgate exit code
      if: ${{ always() && steps.scan.outputs.exit_code != '' && steps.scan.outputs.exit_code != '0' }}
      shell: bash
      env:
        EXIT_CODE: ${{ steps.scan.outputs.exit_code }}
      run: exit "${EXIT_CODE}"
