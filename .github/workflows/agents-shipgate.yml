name: Agents Shipgate

on:
  pull_request:
    paths:
      - "agents/**"
      - "specs/**"
      - ".agents-shipgate/**"
      - "shipgate.yaml"
      - "src/agents_shipgate/**"
  push:
    branches:
      - main
    paths:
      - "agents/**"
      - "specs/**"
      - ".agents-shipgate/**"
      - "shipgate.yaml"
      - "src/agents_shipgate/**"

permissions:
  contents: read

jobs:
  agents-shipgate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"

      - name: Install package
        run: python -m pip install -e .

      - name: Run Agents Shipgate
        run: |
          agents-shipgate scan \
            --config samples/support_refund_agent/shipgate.yaml \
            --ci-mode advisory \
            --out agents-shipgate-reports \
            --format markdown,json

      - name: Upload Agents Shipgate report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: agents-shipgate-report
          path: agents-shipgate-reports/
