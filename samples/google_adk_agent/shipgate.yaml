version: "0.1"

project:
  name: google-adk-support-agent

agent:
  name: adk-support-agent
  declared_purpose:
    - handle support lookup and approval routing

environment:
  target: production_like

tool_sources:
  - id: adk_support
    type: google_adk
    path: agent.py

google_adk:
  eval_sets:
    - evals/support.eval.json

policies:
  require_approval_for_tools:
    - request_refund_approval
