stages:
  - test

agents_shipgate:
  stage: test
  image: python:3.12
  script:
    - python -m pip install "agents-shipgate==0.7.0"
    - agents-shipgate scan --config shipgate.yaml --ci-mode advisory --format markdown,json,sarif
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - agents-shipgate-reports/
