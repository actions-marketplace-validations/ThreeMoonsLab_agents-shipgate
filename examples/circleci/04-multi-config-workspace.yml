version: 2.1

jobs:
  agents-shipgate:
    docker:
      - image: cimg/python:3.12
    steps:
      - checkout
      - run: python -m pip install "agents-shipgate==0.7.0"
      - run:
          name: Agents Shipgate workspace scan
          command: >
            agents-shipgate scan
            --workspace .
            --ci-mode advisory
            --format markdown,json,sarif
            --out agents-shipgate-reports
      - store_artifacts:
          path: agents-shipgate-reports
          destination: agents-shipgate-reports

workflows:
  agents-shipgate:
    jobs:
      - agents-shipgate
